<div class="controls">
    <div class="control-group">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate">
    </div>
    <div class="control-group">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate">
    </div>
    <div class="control-group"
        style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 5px;">
        <label for="filterDateSwitch" style="font-size: 0.75rem; margin-bottom: 2px; white-space: nowrap;">Save
            Filter</label>
        <label class="switch" style="transform: scale(0.8); transform-origin: top;">
            <input type="checkbox" id="filterDateSwitch">
            <span class="slider"></span>
        </label>
    </div>
    <div class="control-group"
        style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 5px;">
        <label for="showToDoSwitch" style="font-size: 0.75rem; margin-bottom: 2px; white-space: nowrap;">Show To
            Do</label>
        <label class="switch" style="transform: scale(0.8); transform-origin: top;">
            <input type="checkbox" id="showToDoSwitch">
            <span class="slider"></span>
        </label>
    </div>
    <label for="localFilterId" style="font-size: 12px; margin-bottom: 2px;">Task ID</label>
    <input type="text" id="localFilterId" placeholder="e.g. 1234" style="padding: 4px; font-size: 12px;">
</div>
<div class="control-group" style="margin-bottom: 5px; display: flex; flex-direction: column;">
    <label for="localFilterTitle" style="font-size: 12px; margin-bottom: 2px;">Title</label>
    <input type="text" id="localFilterTitle" placeholder="Substring match" style="padding: 4px; font-size: 12px;">
</div>
<div class="control-group" style="margin-bottom: 5px; display: flex; flex-direction: column;">
    <label for="localFilterDate" style="font-size: 12px; margin-bottom: 2px;">Changed Date</label>
    <input type="date" id="localFilterDate" style="padding: 4px; font-size: 12px;">
</div>
<div class="control-group" style="margin-bottom: 5px; display: flex; flex-direction: column;">
    <label for="localFilterStatus" style="font-size: 12px; margin-bottom: 2px;">Status</label>
    <select id="localFilterStatus" style="padding: 4px; font-size: 12px;">
        <option value="">All</option>
    </select>
</div>
</div>

<div class="tasks-table-container">
    <table class="tasks-table">
        <thead>
            <tr>
                <th data-column="id" style="cursor: pointer; user-select: none;" title="Click to sort">Task ID</th>
                <th data-column="title" style="cursor: pointer; user-select: none;" title="Click to sort">Title</th>
                <th data-column="date" style="cursor: pointer; user-select: none;" title="Click to sort">Changed Date
                </th>
                <th data-column="status" style="cursor: pointer; user-select: none;" title="Click to sort">Status</th>
                <th data-column="estimate" style="cursor: pointer; user-select: none;" title="Click to sort">Original
                    Estimate</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tasksBody"></tbody>
    </table>
</div>

<div class="footer-actions">
    <button id="addAllBtn" class="btn-secondary experimental-feature">Add all to Time Sheet</button>
</div>
