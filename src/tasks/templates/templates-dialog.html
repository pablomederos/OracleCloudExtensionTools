<div class="dialog-header">
    <h2 style="color: var(--color-neutral-white);">Comment Templates</h2>
    <button class="close-btn">&times;</button>
</div>

<div class="dialog-body" style="padding: 20px;">
    <div style="display: flex; gap: 20px; height: 400px;">
        <div style="flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--color-neutral-mid); padding-right: 20px;">
            <h5 style="margin-top: 0; font-size: 1rem; color: var(--color-neutral-dark);">Saved Templates</h5>
            <div id="templatesList" style="flex: 1; overflow-y: auto; border: 1px solid var(--color-neutral-mid); border-radius: 4px;">
            </div>
            <button id="addTemplateBtn" style="margin-top: 10px; width: 100%;">+ New Template</button>
        </div>

        <div id="editorPanel" style="flex: 1; display: flex; flex-direction: column; display: none;">
            <h5 id="editorTitle" style="margin-top: 0; font-size: 1rem; color: var(--color-neutral-dark);">New Template</h5>
            <input type="text" id="templateTitle" placeholder="Title"
                style="margin-bottom: 10px; padding: 8px; border: 1px solid var(--color-neutral-mid); border-radius: 4px;">
            <textarea id="templateContent" placeholder="Content"
                style="flex: 1; margin-bottom: 10px; padding: 8px; border: 1px solid var(--color-neutral-mid); border-radius: 4px; resize: none;"></textarea>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="cancelTemplateBtn" class="btn-secondary">Cancel</button>
                <button id="saveTemplateBtn" class="btn-primary">Save</button>
            </div>
        </div>

        <div id="emptyState" style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--color-neutral-dark);">
            Select a template to view or click New Template
        </div>
    </div>
</div>
